<!DOCTYPE html>
<!-- saved from url=(0057)http://192.168.60.40/web202605/20260625-ch11-form-JS.html -->
<html lang="zh-TW">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳點餐表單</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
    <link rel="stylesheet" href="restaurant-order.css">
</head>

<body class="bg-light">
    <div class="container pt-5">
        <div class="row justify-content-center" id="s01">
            <div class="display-4 fw-900 text-center text-bg-primary py-2">餐廳線上點餐</div>
            <div class="col-md-6 mt-3">
                <div class="mb-3 form-floating">
                    <input type="text" class="form-control form-control-lg" name="" id="pname" placeholder="">
                    <label for="pname" class="form-label">餐點名稱(字數1-6)</label>
                    <div class="valid-feedback">餐點名稱符合規定。</div>
                    <div class="invalid-feedback">餐點名稱請輸入 1 到 6 個字。</div>
                </div>
                <div class="mb-3">
                    <label for="pnum" class="form-label">份數(1-10)</label>
                    <input type="number" class="form-control form-control-lg" min="1" max="10" id="pnum"
                        placeholder="請輸入餐點份數。">
                    <div class="valid-feedback">份數符合規定。</div>
                    <div class="invalid-feedback">份數請輸入 1 到 10 之間。</div>
                </div>
                <!-- 使用Datalist 做出 產品簡介(規格，備註)..... -->
                <div class="mb-3">
                    <label for="pstandard" class="form-label">餐點備註</label>
                    <input type="text" class="form-control form-control-lg" id="pstandard" list="datalistoption"
                        placeholder="備註字數1-6">
                    <datalist id="datalistoption">
                        <option value="少辣"></option>
                        <option value="不加蔥"></option>
                        <option value="醬另放"></option>
                    </datalist>
                    <div class="valid-feedback">餐點備註符合規定。</div>
                    <div class="invalid-feedback">餐點備註請輸入 1 到 6 個字。</div>
                </div>

                <div class="mb-3">
                    <select name="" id="psize" class="form-select form-select-lg is-invalid">
                        <option value="" disabled="" selected="" class="text-center fw-900">* * * 請選擇餐點份量 * * *</option>
                        <option value="分享餐">分享餐</option>
                        <option value="大份">大份</option>
                        <option value="一般">一般</option>
                        <option value="小份">小份</option>
                    </select>
                    <div class="valid-feedback">已選擇餐點份量</div>
                    <div class="invalid-feedback">請選擇餐點份量</div>
                </div>
                <div class="mb-3 form-check form-switch">
                    <input type="checkbox" name="" id="pstatus" class="form-check-input" checked>
                    <label for="" class="form-check-label" id="pstatus_text">供應狀態：可供應</label>
                </div>
                <div class="mb-3">
                    <div class="form-label fw-900">加購項目：至少選擇一項</div>
                    <div id="topping_group" class="is-invalid">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="起司">
                            <label for="" class="form-check-label">起司</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="溫泉蛋">
                            <label for="" class="form-check-label">溫泉蛋</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="薯條">
                            <label for="" class="form-check-label">薯條</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="濃湯">
                            <label for="" class="form-check-label">濃湯</label>
                        </div>
                    </div>
                    <div class="valid-feedback">已選擇加購項目</div>
                    <div class="invalid-feedback">請至少選擇一項加購項目</div>
                </div>
                <div class="mb-3">
                    <div class="form-label fw-900">用餐方式：請選擇一項</div>
                    <div id="drinkWay" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input supply_item" name="supply" value="內用">
                            <label for="" class="form-check-label">內用</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input supply_item" name="supply" value="外帶">
                            <label for="" class="form-check-label">外帶</label>
                        </div>
                    </div>
                    <div class="valid-feedback">已選擇用餐方式</div>
                    <div class="invalid-feedback">請選擇用餐方式</div>
                </div>
                <div class="text-end mt-4">
                    <button class="btn btn-secondary">重新選擇</button>
                    <button class="btn btn-primary" id="ok_btn">確認點餐</button>
                </div>
            </div>
        </div>

        <div class="row mt-5 justify-content-center d-none" id="s02">
            <div class="display-5 fw-900 text-center text-bg-success py-2 rounded-3">訂單明細確認</div>
            <div class="col-md-6 p-3">
                <div id="showmessage"></div>
                <button class="btn btn-secondary mt-3 w-100">返回修改</button>
                <button class="btn btn-warning mt-3 w-100">送出訂單</button>
            </div>
        </div>
    </div>
    <script src="Javascript/bootstrap.bundle.min.js"></script>
    <script src="Javascript/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let flag_pname = false;
        let flag_pnum = false;
        let flag_pstandard = false;
        let flag_size = false;
        let flag_topping = false;
        let flag_drinkWay = false;
        $(function () {
            //監聽#pname
            $("#pname").on("input", function () {
                console.log($(this).val().length);
                let pname = $(this).val().trim();

                if (pname.length >= 1 && pname.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pname = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pname = false;
                }
            });

            //監聽#pnum 數字記得使用 Number()
            $("#pnum").on("input", function () {
                console.log($(this).val());

                let pnum = Number($(this).val());
                if (pnum >= 1 && pnum <= 10) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pnum = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pnum = false;
                }
            });

            //監聽#pstandard
            $("#pstandard").on("input", function () {
                console.log($(this).val());
                let pstandard = $(this).val().trim();

                if (pstandard.length >= 1 && pstandard.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pstandard = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pstandard = false;
                }
            });

            //監聽#psize
            $("#psize").on("change", function () {
                console.log($(this).val());
                let psize = $(this).val().trim();
                if (psize != "") {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_size = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_size = false;
                }
            });

            //監聽#pstatus
            $("#pstatus").on("change", function () {
                console.log($(this).prop("checked"));

                let pstatus = $(this).prop("checked");
                if (pstatus) {
                    $("#pstatus_text").text("供應狀態：可供應");
                } else {
                    $("#pstatus_text").text("供應狀態：暫停供應");
                }
            })

            //監聽.topping_item
            $(".topping_item").on("change", function () {
                console.log($(".topping_item:checked").length);

                let count = $(".topping_item:checked").length;
                if (count > 0) {
                    $("#topping_group").removeClass("is-invalid");
                    $("#topping_group").addClass("is-valid");
                    flag_topping = true;
                } else {
                    $("#topping_group").removeClass("is-valid");
                    $("#topping_group").addClass("is-invalid");
                    flag_topping = false;
                };

            })

            //監聽.supply_item
            $(".supply_item").on("change", function () {
                console.log($(".supply_item:checked").val());
                let supply = $(".supply_item:checked").val();
                if (supply != undefined) {
                    //符合規定
                    $("#drinkWay").removeClass("is-invalid");
                    $("#drinkWay").addClass("is-valid");
                    flag_drinkWay = true;
                } else {
                    //不符合規定
                    $("#drinkWay").removeClass("is-valid");
                    $("#drinkWay").addClass("is-invalid");
                    flag_drinkWay = false;
                }
            })

            //按鈕監聽 #ok_btn
            $("#ok_btn").on("click", function () {
                if (flag_pname && flag_pnum && flag_pstandard && flag_size && flag_topping && flag_drinkWay) {
                    //顯示飲料產品建檔-明細確認
                    $("#s02").removeClass("d-none");

                    //三元運算子
                    let pstatus = $("#pstatus").prop("checked") ? "可供應" : "暫停供應";

                    //收集可加配料
                    let toppingArray = [];
                    $(".topping_item:checked").each(function () {
                        console.log($(this).val());
                        toppingArray.push($(this).val());
                    })
                    console.log(toppingArray);
                    //供應方式
                    let supply = $(".supply_item:checked").val();

                    let strHTML = `<h3>餐點名稱：${$("#pname").val()}</h3>
                                    <h3>餐點份數：${$("#pnum").val()}</h3>
                                    <h3>餐點備註：${$("#pstandard").val()}</h3>
                                    <h3>餐點份量：${$("#psize").val()}</h3>
                                    <h3>供應狀態：${pstatus}</h3>
                                    <h3>加購項目：${toppingArray.join(", ")}</h3>
                                    <h3>用餐方式：${supply}</h3>`;
                    $("#showmessage").html(strHTML);
                } else {
                    Swal.fire({
                        title: "訂單內容未完成",
                        text: "請確認餐點、份數、份量、加購項目與用餐方式。",
                        icon: "error"
                    });
                    $("#s02").addClass("d-none");
                }

            });
        });
    </script>


</body>

</html>
